name: Verificacion Basica

on:
  push:
    branches:
      - main

jobs:
  verificar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Verificar archivo index.html
        run: test -f index.html

      - name: Verificar archivo style.css
        run: test -f css/style.css

      - name: Verificar archivo script.js
        run: test -f js/script.js

      - name: Mensaje de validacion
        run: echo "Proyecto validado correctamente"